<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512' width='512' height='512'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#f5f1ea'/>
      <stop offset='100%' stop-color='#e8e2d8'/>
    </linearGradient>
    <linearGradient id='gold' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0%' stop-color='#c8901a'/>
      <stop offset='100%' stop-color='#8a5f08'/>
    </linearGradient>
    <linearGradient id='globe' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#1e6b60'/>
      <stop offset='100%' stop-color='#2a5485'/>
    </linearGradient>
    <filter id='shadow'>
      <feDropShadow dx='0' dy='8' stdDeviation='18' flood-color='rgba(0,0,0,0.18)'/>
    </filter>
  </defs>

  <!-- Rounded rect background -->
  <rect width='512' height='512' rx='114' ry='114' fill='url(#bg)'/>

  <!-- Globe circle -->
  <circle cx='256' cy='242' r='148' fill='url(#globe)' filter='url(#shadow)'/>

  <!-- Latitude lines -->
  <ellipse cx='256' cy='242' rx='148' ry='50' fill='none' stroke='rgba(255,255,255,0.18)' stroke-width='2.5'/>
  <ellipse cx='256' cy='192' rx='120' ry='32' fill='none' stroke='rgba(255,255,255,0.14)' stroke-width='2'/>
  <ellipse cx='256' cy='292' rx='120' ry='32' fill='none' stroke='rgba(255,255,255,0.14)' stroke-width='2'/>

  <!-- Longitude lines -->
  <line x1='256' y1='94' x2='256' y2='390' stroke='rgba(255,255,255,0.18)' stroke-width='2.5'/>
  <ellipse cx='256' cy='242' rx='50' ry='148' fill='none' stroke='rgba(255,255,255,0.18)' stroke-width='2.5'/>

  <!-- Globe outline -->
  <circle cx='256' cy='242' r='148' fill='none' stroke='rgba(255,255,255,0.25)' stroke-width='3'/>

  <!-- Gold pin -->
  <circle cx='256' cy='196' r='32' fill='url(#gold)' filter='url(#shadow)'/>
  <circle cx='256' cy='196' r='14' fill='#fff' opacity='0.95'/>
  <!-- Pin tail -->
  <path d='M243 220 Q256 252 256 252 Q256 252 269 220 Z' fill='url(#gold)'/>

  <!-- Subtle bottom label dots -->
  <circle cx='214' cy='388' r='7' fill='rgba(255,255,255,0.35)'/>
  <circle cx='256' cy='388' r='7' fill='rgba(255,255,255,0.55)'/>
  <circle cx='298' cy='388' r='7' fill='rgba(255,255,255,0.35)'/>
</svg>