<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Trip Planner">
<meta name="theme-color" content="#f5f1ea">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<title>Trip Planner 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#ede9e3;--bg1:#ffffff;--bg2:#f5f2ed;--bg3:#ede9e3;--bg4:#e4dfd7;
  --border:rgba(26,23,20,0.09);--border2:rgba(26,23,20,0.16);
  --cream:#1a1714;--cream2:rgba(26,23,20,0.75);--cream3:rgba(26,23,20,0.48);--cream4:rgba(26,23,20,0.30);
  --gold:#a0720e;--gold2:#8a5f08;--gold3:rgba(160,114,14,0.10);
  --teal:#1e6b60;--blue:#2a5485;--pink:#7a3d62;--red:#a83820;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg0);color:var(--cream)}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
@keyframes modalIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}

#app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sidebar{width:204px;min-width:204px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:16px 14px 12px;border-bottom:1px solid var(--border)}
.trip-label{font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-bottom:5px}
.trip-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--cream);line-height:1.2;margin-bottom:3px}
.trip-title em{font-style:italic;font-weight:400}
.trip-dates{font-size:10px;color:var(--cream4)}
.sidebar-nav{padding:10px 8px 6px}
.nav-btn{width:100%;display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;font-size:12px;font-weight:500;color:var(--cream4);background:transparent;border:1px solid transparent;margin-bottom:2px;transition:all .12s;text-align:left}
.nav-btn:hover{background:var(--bg2);color:var(--cream2)}
.nav-btn.active{background:var(--gold3);color:var(--gold);border-color:rgba(160,114,14,.2)}
.nav-icon{width:14px;height:14px;flex-shrink:0;opacity:.65}
.nav-btn.active .nav-icon{opacity:1}
.regions-label{font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--cream4);text-transform:uppercase;padding:6px 8px 6px}
.region-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:3px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;transition:all .12s}
.region-bar{width:3px;min-height:32px;border-radius:2px;flex-shrink:0;margin-top:1px}
.region-name{font-size:12px;font-weight:600;color:var(--cream2)}
.region-days{font-size:10px;color:var(--cream4);margin-top:1px}
.sidebar-footer{padding:10px 12px 14px;border-top:1px solid var(--border)}
.add-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:8px;font-size:12px;font-weight:600;background:var(--gold);color:#fff;transition:opacity .12s}
.add-btn:hover{opacity:.85}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#toolbar{height:50px;min-height:50px;display:flex;align-items:center;padding:0 16px;gap:10px;border-bottom:1px solid var(--border);background:var(--bg1)}
.toolbar-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:var(--cream);margin-right:2px}
.month-nav{display:flex;align-items:center;gap:4px}
.mnav-btn{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border2);background:var(--bg2);color:var(--cream3);transition:all .12s;font-size:14px}
.mnav-btn:hover{background:var(--bg3);color:var(--cream)}
.month-label{min-width:148px;text-align:center;font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:var(--cream)}
.today-btn{margin-left:4px;padding:4px 9px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid var(--border2);background:var(--bg2);color:var(--cream4);transition:all .12s;letter-spacing:.03em}
.today-btn:hover{background:var(--bg3);color:var(--cream2)}
.flex1{flex:1}
.stat-chip{font-size:10px;font-weight:500;background:var(--bg2);border-radius:6px;padding:3px 8px;border:1px solid var(--border)}
.tb-add{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;background:var(--gold);color:#fff;transition:opacity .12s}
.tb-add:hover{opacity:.85}

/* CONTENT AREA */
#content{flex:1;display:flex;overflow:hidden}
#view-area{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* CALENDAR */
#calendar{flex:1;display:flex;flex-direction:column;overflow:hidden;animation:fadeIn .2s ease}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);background:var(--bg1);flex-shrink:0}
.cal-dow{padding:8px 0 7px;text-align:center;font-size:10px;font-weight:600;color:var(--cream3);letter-spacing:.07em;text-transform:uppercase}
.cal-dow:not(:last-child){border-right:1px solid var(--border)}
.cal-legend{display:flex;height:26px;border-bottom:1px solid var(--border);background:var(--bg1);flex-shrink:0;align-items:center;padding:0 14px;gap:18px;overflow-x:auto}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-text{font-size:9px;color:var(--cream4);font-weight:600;letter-spacing:.05em;white-space:nowrap}
.cal-grid{flex:1;overflow:hidden;display:flex;flex-direction:column}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);flex:1 1 0;min-height:0;border-bottom:1px solid var(--border)}
.cal-week:last-child{border-bottom:none}
.cal-day{border-right:1px solid var(--border);height:100%;overflow:hidden;position:relative;cursor:pointer;display:flex;flex-direction:column;padding:7px 8px 6px;transition:filter .15s}
.cal-day:last-child{border-right:none}
.cal-day.out-month{opacity:.3;cursor:default}
.cal-day:not(.out-month):hover{filter:brightness(.96)}
.day-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;flex-shrink:0}
.day-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.day-num.today{background:var(--gold);color:#fff;font-weight:700}
.day-num.has-event{background:rgba(255,255,255,.55);border:1.5px solid rgba(255,255,255,.7)}
.day-num.no-event{color:var(--cream4)}
.event-badge{font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:rgba(255,255,255,.55);border-radius:4px;padding:2px 5px;border:1px solid rgba(255,255,255,.5)}
.cont-label{font-size:8px;font-weight:600;opacity:.7}
.day-title{font-family:'Playfair Display',serif;font-size:12px;font-weight:600;color:#1e3a8a;line-height:1.25;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;flex:1;position:relative;z-index:1}
.day-title.continuation{font-size:11px;font-weight:400;font-style:italic}
.day-glyph{position:absolute;bottom:4px;right:6px;line-height:1;pointer-events:none}
.day-dots{display:flex;gap:3px;margin-top:4px;flex-shrink:0;align-items:center;position:relative;z-index:1}
.task-dot{width:5px;height:5px;border-radius:50%}
.dot-count{font-size:8px;margin-left:2px;opacity:.8}
.region-stripe{position:absolute;top:0;left:0;right:0;height:3px;opacity:.6}
.empty-plus{flex:1;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--cream3);opacity:.25;transition:opacity .15s}
.cal-day:not(.out-month):hover .empty-plus{opacity:.5}

/* DETAIL PANEL */
#detail-panel{width:320px;min-width:320px;height:100%;background:var(--bg1);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;animation:slideIn .2s ease}
.panel-header{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.panel-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.panel-type-badge{display:inline-flex;align-items:center;gap:4px;border-radius:4px;padding:2px 8px;margin-bottom:7px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.panel-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--cream);line-height:1.3;margin-bottom:3px}
.panel-date{font-size:11px;color:var(--cream3)}
.close-btn{width:28px;height:28px;border-radius:6px;background:var(--bg3);color:var(--cream3);display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;font-size:14px}
.close-btn:hover{background:var(--bg4);color:var(--cream)}
.panel-location{margin-top:10px;display:flex;align-items:flex-start;gap:7px;background:var(--bg2);border-radius:8px;padding:8px 10px}
.panel-location span{font-size:11px;color:var(--cream3);line-height:1.5;flex:1}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto}
.ptab{padding:10px 12px 9px;font-size:12px;font-weight:500;color:var(--cream4);border-bottom:2px solid transparent;background:none;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:all .15s;margin-bottom:-1px}
.ptab:hover{color:var(--cream2)}
.ptab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-badge{border-radius:10px;padding:1px 6px;font-size:10px;font-weight:600}
.ptab.active .tab-badge{background:var(--gold3);color:var(--gold)}
.ptab:not(.active) .tab-badge{background:var(--bg3);color:var(--cream4)}
.panel-body{flex:1;overflow-y:auto;padding:14px 16px}
.tab-content{animation:fadeIn .15s ease}
.section-meta{font-size:10px;color:var(--cream4);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.check-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer}
.check-row:last-of-type{border-bottom:none}
.checkbox{width:16px;height:16px;min-width:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.checkbox.unchecked{border:1.5px solid var(--cream4);background:transparent}
.checkbox.checked{background:var(--gold);border:none}
.check-label{font-size:12px;color:var(--cream2);flex:1;transition:all .15s}
.check-label.done{text-decoration:line-through;color:var(--cream4)}
.add-row{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:12px;color:var(--cream4);padding:4px 0;cursor:pointer;background:none;transition:color .12s;width:100%}
.add-row:hover{color:var(--gold)}
.add-input-row{display:flex;gap:6px;margin-top:8px}
.add-input{flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;font-size:12px;color:var(--cream);outline:none}
.add-input:focus{border-color:rgba(160,114,14,.4)}
.confirm-btn{background:var(--gold);color:#fff;border-radius:6px;padding:6px 10px;font-size:12px;font-weight:600}
.doc-item{display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:background .12s;border:1px solid var(--border)}
.doc-item:hover{background:var(--bg3)}
.doc-icon{width:30px;height:30px;background:var(--bg3);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.doc-label{font-size:12px;color:var(--cream2);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-size{font-size:10px;color:var(--cream4);margin-top:1px}
.upload-btn{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;font-size:12px;color:var(--cream4);border:1px dashed var(--border2);border-radius:8px;width:100%;padding:10px;cursor:pointer;transition:all .12s;background:none}
.upload-btn:hover{color:var(--gold);border-color:rgba(160,114,14,.4)}
.notes-area{width:100%;min-height:180px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:12px;color:var(--cream2);line-height:1.7;resize:vertical;outline:none;transition:border-color .15s}
.notes-area:focus{border-color:rgba(160,114,14,.4)}
.notes-hint{font-size:10px;color:var(--cream4);margin-top:6px}

/* TIMELINE */
#timeline{flex:1;overflow-y:auto;padding:16px 20px;animation:fadeIn .2s ease}
.region-section{margin-bottom:28px}
.region-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px}
.region-emoji{font-size:20px}
.region-header-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--cream)}
.region-header-sub{font-size:11px;color:var(--cream4)}
.region-line{flex:1;height:1px;margin-left:10px}
.tl-event{display:flex;gap:14px;margin-bottom:8px;cursor:pointer;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg1);transition:all .15s}
.tl-event:hover{background:var(--bg2);border-color:var(--border2)}
.tl-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tl-body{flex:1;min-width:0}
.tl-title{font-size:13px;font-weight:600;color:var(--cream);margin-bottom:2px}
.tl-date{font-size:11px;color:var(--cream4)}
.tl-loc{font-size:11px;color:var(--cream4);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-chips{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.tl-chip{font-size:10px;border-radius:4px;padding:2px 6px;white-space:nowrap}

/* PACKING */
#packing{flex:1;overflow-y:auto;padding:20px 24px;animation:fadeIn .2s ease}
.pack-progress-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--cream)}
.pack-progress-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:8px;margin-bottom:20px}
.pack-progress-fill{height:100%;background:linear-gradient(to right,var(--gold),var(--teal));border-radius:3px;transition:width .3s ease}
.pack-section{margin-bottom:24px}
.pack-section-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.pack-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.pack-event-tag{font-size:10px;color:var(--cream4);background:var(--bg2);border-radius:4px;padding:1px 6px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .15s ease}
#modal-overlay.hidden{display:none}
.modal{background:var(--bg1);border-radius:14px;border:1px solid var(--border2);width:480px;max-width:95vw;animation:modalIn .2s ease;overflow:hidden}
.modal-header{padding:18px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:var(--cream)}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.form-label{font-size:11px;color:var(--cream4);font-weight:500;display:block;margin-bottom:5px;letter-spacing:.04em}
.form-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--cream);outline:none;transition:border-color .15s}
.form-input:focus{border-color:rgba(160,114,14,.4)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-hint{font-size:10px;color:var(--cream4);margin-top:3px}
.type-btns{display:flex;gap:6px;flex-wrap:wrap}
.type-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--bg2);color:var(--cream3);transition:all .12s;cursor:pointer}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.cancel-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;background:var(--bg2);color:var(--cream3);border:1px solid var(--border);transition:all .12s;cursor:pointer}
.cancel-btn:hover{background:var(--bg3)}
.submit-btn{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;background:var(--gold);color:#fff;border:none;cursor:pointer;transition:opacity .12s}
.submit-btn:hover{opacity:.85}
.submit-btn:disabled{opacity:.4;cursor:default}

/* SUMMARY MODAL */
#summary-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .15s ease}
#summary-overlay.hidden{display:none}
.summary-modal{background:var(--bg1);border-radius:14px;border:1px solid var(--border2);width:560px;max-width:95vw;max-height:82vh;display:flex;flex-direction:column;animation:modalIn .2s ease;overflow:hidden}
.summary-filter-bar{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.summary-body{flex:1;overflow-y:auto;padding:4px 20px 16px}
.sum-group-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin:14px 0 5px;display:flex;align-items:center;gap:6px}
.sum-group-label:first-child{margin-top:8px}
.sum-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer}
.sum-row:last-child{border-bottom:none}

/* ENTITY TOGGLE (modal) */
.modal-entity-toggle{display:flex;gap:6px}
.entity-btn{display:flex;align-items:center;justify-content:center;gap:6px;flex:1;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--bg2);color:var(--cream3);transition:all .12s;cursor:pointer}
.entity-btn.active{background:var(--gold3);border-color:rgba(160,114,14,.3);color:var(--gold)}

/* LOCATION ROW in day cell */
.day-loc-row{display:flex;align-items:center;margin-bottom:3px;flex-shrink:0;min-height:15px;cursor:pointer}
.day-loc-pill{font-size:9px;font-weight:600;color:rgba(0,0,0,.58);background:rgba(255,255,255,.62);border-radius:4px;padding:1px 5px;border:1px solid rgba(0,0,0,.08);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;display:inline-block;transition:background .12s}
.day-loc-pill:hover{background:rgba(255,255,255,.88)}
.day-loc-empty{font-size:9px;color:var(--cream4);opacity:.3;transition:opacity .15s;padding:1px 2px}
.cal-day:not(.out-month):hover .day-loc-empty{opacity:.7}

/* ── MOBILE / iOS ───────────────────────────────────────────────────────────── */
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
#mobile-nav{display:none}
#mobile-add-btn{display:none}

@media(max-width:768px){
  /* Base layout */
  html,body{height:100%;overflow:hidden}
  #app{flex-direction:column;height:100dvh;height:calc(var(--vh,1vh)*100)}

  /* Hide desktop sidebar */
  #sidebar{display:none!important}

  /* Main fills remaining space */
  #main{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}

  /* Compact toolbar — hide all desktop-only chrome */
  #toolbar{height:50px;min-height:50px;padding:0 10px 0 14px;gap:6px}
  .toolbar-title{display:none}
  #stat-chips{display:none!important}
  .tb-add{display:none!important}
  #toolbar .flex1{display:none!important}
  #save-toast{display:none!important}
  /* Reset button stays small */
  #toolbar button[onclick="resetData()"]{margin-right:0}

  /* Month nav — never wraps, label always one line */
  .month-nav{flex:1;justify-content:center;gap:4px}
  .month-label{font-size:15px;font-weight:700;white-space:nowrap;min-width:0;text-align:center}
  .mnav-btn{width:32px;height:32px}
  .today-btn{font-size:10px;padding:4px 8px;white-space:nowrap}

  /* Mobile + button top-right */
  #mobile-add-btn{
    display:flex!important;
    width:34px;height:34px;border-radius:50%;
    background:var(--gold);color:#fff;

    width:38px;height:4px;
    background:var(--border2);border-radius:2px;
    margin:0 auto 10px;
  }
  .panel-title{font-size:15px}
  .panel-body{padding:12px 14px}

  #modal-overlay,#summary-overlay{
    align-items:flex-end!important;
    padding:0;

  .modal,.summary-modal{
    width:100%!important;max-width:100vw!important;

}

function fmtDate(off){
  const d=o2date(off);
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
}
function dateToOff(dateStr){
  const [y,m,d]=dateStr.split('-').map(Number);

function getRegionForDay(off){ return REGIONS.find(r=>r.startDay<=off&&r.endDay>=off)||null; }
function getLocationForDay(off){ return LOCATIONS.find(l=>l.startDay<=off&&l.endDay>=off)||null; }
function getMonthGrid(y,m){
  const first=new Date(y,m,1), dow=first.getDay();
  const dim=new Date(y,m+1,0).getDate();
  const grid=[]; let n=1-dow;
  for(let w=0;w<6;w++){
    const week=[];
    for(let d=0;d<7;d++){
      const date=new Date(y,m,n);
      week.push({date,off:Math.round((date-TRIP_START)/86400000),inMonth:n>=1&&n<=dim});
      n++;
    }
    grid.push(week);
    if(n>dim&&w>=4) break;
  }
  return grid;
}

let summaryType='events';
function openSummary(type){
  summaryType=type;
  document.getElementById('summary-from').value='';
  document.getElementById('summary-to').value='';
  document.getElementById('summary-overlay').classList.remove('hidden');
  renderSummaryBody();
}
function closeSummary(){document.getElementById('summary-overlay').classList.add('hidden');}
function clearSummaryFilter(){
  document.getElementById('summary-from').value='';
  document.getElementById('summary-to').value='';
  renderSummaryBody();
}
function renderSummaryBody(){
  const fromVal=document.getElementById('summary-from').value;
  const toVal=document.getElementById('summary-to').value;
  const fromOff=fromVal?dateToOff(fromVal):null;
  const toOff=toVal?dateToOff(toVal):null;
  const filtered=EVENTS.filter(e=>
    (fromOff===null||e.endDay>=fromOff)&&(toOff===null||e.startDay<=toOff)
  ).sort((a,b)=>a.startDay-b.startDay);

  const titles={events:'All Events',tasks:'All Tasks',packing:'Packing List'};
  document.getElementById('summary-title').textContent=titles[summaryType];
  const body=document.getElementById('summary-body');

  if(summaryType==='events'){
    document.getElementById('summary-count').textContent=filtered.length+' events';
    if(!filtered.length){body.innerHTML='<p style="font-size:12px;color:var(--cream4);font-style:italic;padding-top:12px">No events in this range.</p>';return;}
    body.innerHTML=filtered.map(e=>{
      const c=ECOLS[e.type]||ECOLS.activity;
      const pT=e.tasks.filter(t=>!t.done).length, pP=e.packing.filter(p=>!p.done).length;
      return `<div style="display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)">
        <div style="width:34px;height:34px;border-radius:8px;background:${c.bg};border:1px solid ${c.border}40;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${ICONS[e.type]}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:var(--cream)">${e.title}</div>
          <div style="font-size:11px;color:var(--cream4);margin-top:1px">${fmtDate(e.startDay)}${e.endDay>e.startDay?' → '+fmtDate(e.endDay):''}</div>
          ${e.location?`<div style="font-size:11px;color:var(--cream4);margin-top:1px">📍 ${e.location}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
          ${pT?`<span style="font-size:10px;background:rgba(160,114,14,.12);color:var(--gold);border-radius:4px;padding:2px 7px">${pT} tasks</span>`:''}
          ${pP?`<span style="font-size:10px;background:var(--bg3);color:var(--teal);border-radius:4px;padding:2px 7px">${pP} to pack</span>`:''}
        </div>
      </div>`;
    }).join('');

  } else if(summaryType==='tasks'){
    const total=filtered.flatMap(e=>e.tasks);
    const done=total.filter(t=>t.done).length;
    document.getElementById('summary-count').textContent=`${done}/${total.length} done`;
    if(!total.length){body.innerHTML='<p style="font-size:12px;color:var(--cream4);font-style:italic;padding-top:12px">No tasks in this range.</p>';return;}
    let html='';
    filtered.forEach(e=>{
      if(!e.tasks.length) return;
      const c=ECOLS[e.type]||ECOLS.activity;
      html+=`<div class="sum-group-label" style="color:${c.text}">${ICONS[e.type]} ${e.title} <span style="color:var(--cream4);font-weight:400;text-transform:none;letter-spacing:0;font-size:10px">${fmtDate(e.startDay)}</span></div>`;
      html+=e.tasks.map(t=>`
        <div class="sum-row" onclick="toggleTask('${e.id}','${t.id}');renderSummaryBody();renderCalendar()">
          <div style="width:16px;height:16px;min-width:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;${t.done?'background:var(--gold)':'border:1.5px solid var(--cream4)'}">
            ${t.done?'<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5L8 3" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
          </div>
          <span style="font-size:12px;flex:1;color:${t.done?'var(--cream4)':'var(--cream2)'};text-decoration:${t.done?'line-through':'none'}">${t.label}</span>
        </div>`).join('');
    });
    body.innerHTML=html;

  } else {
    const total=filtered.flatMap(e=>e.packing);
    const done=total.filter(p=>p.done).length;
    document.getElementById('summary-count').textContent=`${done}/${total.length} packed`;
    if(!total.length){body.innerHTML='<p style="font-size:12px;color:var(--cream4);font-style:italic;padding-top:12px">No packing items in this range.</p>';return;}
    let html='';
    filtered.forEach(e=>{
      if(!e.packing.length) return;
      const c=ECOLS[e.type]||ECOLS.activity;
      html+=`<div class="sum-group-label" style="color:${c.text}">${ICONS[e.type]} ${e.title}</div>`;
      html+=e.packing.map(p=>`
        <div class="sum-row" onclick="togglePanelPack('${e.id}','${p.id}');renderSummaryBody()">
          <div style="width:16px;height:16px;min-width:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;${p.done?'background:var(--teal)':'border:1.5px solid var(--cream4)'}">

          </div>
          <span style="font-size:12px;flex:1;color:${p.done?'var(--cream4)':'var(--cream2)'};text-decoration:${p.done?'line-through':'none'}">${p.label}</span>
        </div>`).join('');
    });
    body.innerHTML=html;
  }
}

function renderView(){
  ['calendar','timeline','packing'].forEach(v=>
    document.getElementById(v).style.display=state.view===v?'flex':'none');
  if(state.view==='calendar') renderCalendar();
  else if(state.view==='timeline') renderTimeline();
  else renderPacking();

function renderCalendar(){
  const cal=document.getElementById('calendar');
  const grid=getMonthGrid(state.viewYear,state.viewMonth);
  const ms=new Date(state.viewYear,state.viewMonth,1);
  const me=new Date(state.viewYear,state.viewMonth+1,0);
  const msOff=Math.round((ms-TRIP_START)/86400000);
  const meOff=Math.round((me-TRIP_START)/86400000);
  const activeRegions=REGIONS.filter(r=>r.startDay<=meOff&&r.endDay>=msOff);

  const legend=activeRegions.length
    ? activeRegions.map(r=>`<div class="legend-dot" style="background:${r.color}"></div><span class="legend-text">${r.emoji} ${r.name.toUpperCase()}</span>`).join('')
    : '<span class="legend-text" style="font-style:italic">No trip activity this month</span>';

  cal.innerHTML=`
    <div class="cal-dow-row">${DAYS.map(d=>`<div class="cal-dow">${d}</div>`).join('')}</div>
    <div class="cal-legend">${legend}</div>
    <div class="cal-grid" id="cal-grid-inner"></div>`;

  const inner=document.getElementById('cal-grid-inner');
  inner.innerHTML=grid.map((week,wi)=>`
    <div class="cal-week" style="border-bottom:${wi<grid.length-1?'1px solid var(--border)':'none'}">
      ${week.map(({date,off,inMonth},di)=>renderDayCell(date,off,inMonth,di,week.length)).join('')}
    </div>`).join('');
}

function renderDayCell(date,off,inMonth,di,len){
  const event=inMonth?getEventForDay(off):null;
  const region=inMonth?getRegionForDay(off):null;
  const locEntity=inMonth?getLocationForDay(off):null;
  const locTh=locEntity&&LOC_THEMES[locEntity.themeKey]||null;
  const isToday=off===todayOff;
  const isCont=event&&off>event.startDay;
  const th=event?THEMES[event.type]:null;

  // ONLY location drives background, glyph and cell palette — events never change the square's look
  let bg='transparent', bgHover='var(--bg2)', cursor='pointer';
  if(!inMonth){ bg='var(--bg0)'; cursor='default'; bgHover=bg; }
  else if(locTh){ bg=locTh.bg; bgHover=locTh.bgH; }

  const numClass='day-num'+(isToday?' today':((event||locTh)?' has-event':' no-event'));
  const numColor=isToday?'':(locTh?`color:${locTh.title}`:'');

  const stripe=region&&inMonth?`<div class="region-stripe" style="background:${region.color}"></div>`:'';

  // Only show the location flag glyph — no event glyphs
  const glyphContent=locTh?locTh.glyph:'';
  const glyph=glyphContent?`<div class="day-glyph" style="font-size:42px;opacity:.13;transform:rotate(0deg)">${glyphContent}</div>`:'';

  const badgeTxtColor=locTh?locTh.accent:(ECOLS[event&&event.type]||ECOLS.activity).text;
  const badge=event&&!isCont
    ?`<div class="event-badge" style="color:${badgeTxtColor}">${ICONS[event.type]} ${event.type}</div>`
    :event&&isCont
    ?`<div class="cont-label" style="color:${locTh?locTh.sub:'var(--cream4)'}">Day ${off-event.startDay+1} of ${event.endDay-event.startDay+1}</div>`
    :'';

  const titleColor=locTh?locTh.title:'var(--cream2)';
  const title=event
    ?`<div class="day-title${isCont?' continuation':''}" style="color:${titleColor}">${event.title}</div>`
    :inMonth?`<div class="empty-plus">+</div>`:'';

  let dots='';
  if(event&&!isCont&&event.tasks.length){
    const doneCount=event.tasks.filter(t=>t.done).length;
    dots=`<div class="day-dots">
      ${event.tasks.slice(0,5).map(t=>`<div class="task-dot" style="background:${t.done?(locTh?locTh.accent:'var(--gold)'):'rgba(255,255,255,.6)'};border:${t.done?'none':'1px solid rgba(0,0,0,.18)'}"></div>`).join('')}
      ${event.tasks.length>5?`<span class="dot-count" style="color:${locTh?locTh.sub:'var(--cream4)'}">+${event.tasks.length-5}</span>`:''}
      <span class="dot-count" style="color:${locTh?locTh.sub:'var(--cream4)'};margin-left:2px">${doneCount}/${event.tasks.length}</span>
    </div>`;
  }

  const clickAttr=inMonth
    ?`onclick="${event?`openEvent('${event.id}')`:`openModalDay(${off})`}"`
    :'';

  const locPillColor=locTh?locTh.accent:'var(--cream3)';
  const locRow=inMonth?`<div class="day-loc-row" onclick="event.stopPropagation();openLocationForDay(${off})">
      ${locEntity
        ?`<span class="day-loc-pill" style="color:${locPillColor}">${locTh?locTh.glyph:'📍'} ${locEntity.name}<span onmousedown="event.preventDefault();event.stopPropagation();deleteLocation('${locEntity.id}')" style="margin-left:5px;opacity:.5;cursor:pointer;font-size:9px" onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='.5'">✕</span></span>`
        :`<span class="day-loc-empty">📍+</span>`}
    </div>`:'';

  return `<div class="cal-day${!inMonth?' out-month':''}"
    style="background:${bg};cursor:${cursor};border-right:${di<len-1?'1px solid var(--border)':'none'}"
    ${clickAttr}
    onmouseenter="this.style.background='${bgHover}'"
    onmouseleave="this.style.background='${bg}'">
    ${stripe}${glyph}
    <div class="day-top">
      <div class="${numClass}" style="${numColor}">${date.getDate()}</div>
      ${badge}
    </div>
    ${locRow}${title}${dots}
  </div>`;
}

function renderPacking(){
  const pk=document.getElementById('packing');
  const allItems=EVENTS.flatMap(e=>e.packing.map(p=>({...p,eventId:e.id,eventTitle:e.title,eventType:e.type})));
  const total=allItems.length, done=allItems.filter(p=>p.done).length;
  const pct=total?Math.round(done/total*100):0;

  const cats=[
    {type:'flight',label:'Flights'},{type:'excursion',label:'Excursions & Hikes'},
    {type:'hotel',label:'Accommodation'},{type:'activity',label:'Activities'},{type:'travel',label:'Travel'},
  ];

  pk.innerHTML=`
    <div style="margin-bottom:20px">
      <div style="display:flex;align-items:baseline;gap:10px">
        <span class="pack-progress-num">${done}</span>
        <span style="font-size:15px;color:var(--cream4)">of ${total} items packed</span>
      </div>
      <div class="pack-progress-bar"><div class="pack-progress-fill" style="width:${pct}%"></div></div>
    </div>
    ${cats.map(cat=>{
      const items=allItems.filter(i=>i.eventType===cat.type);
      if(!items.length) return '';
      const c=ECOLS[cat.type];
      return `<div class="pack-section">
        <div class="pack-section-header">
          <span>${ICONS[cat.type]}</span>
          <span style="font-size:12px;font-weight:600;color:${c.text};letter-spacing:.04em">${cat.label.toUpperCase()}</span>
          <span style="font-size:11px;color:var(--cream4)">(${items.filter(i=>i.done).length}/${items.length})</span>
        </div>
        ${items.map(item=>`
          <div class="pack-row">
            <div class="checkbox ${item.done?'checked':'unchecked'}" onclick="togglePacking('${item.eventId}','${item.id}')">
              ${item.done?'<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5L8 3" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}

      </div>`;
    }).join('')}`;
}

            ${p.done?'<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5L8 3" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}

      <div id="pack-add-area">
        <button class="add-row" onclick="showPackInput()">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><line x1="8" y1="3" x2="8" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>

      </div>

  } else if(panelTab==='docs'){

      ${e.docs.map(d=>`
        <div class="doc-item" onclick="openDoc(EVENTS.find(ev=>ev.id==='${e.id}').docs.find(d=>d.id==='${d.id}'))" style="cursor:pointer">

        </div>`).join('')}

        <button class="upload-btn" style="flex:1" onclick="showDocInput()">

          Upload file
        </button>
      </div>
      <input type="file" id="doc-file-input" style="display:none" onchange="handleDocFile(this)">
    </div>`;
  } else {
    body.innerHTML=`<div class="tab-content">
      <textarea class="notes-area" onblur="saveNotes('${e.id}',this.value)" placeholder="Add notes, tips, reminders...">${e.notes||''}</textarea>

  }

function showDocInput(){
  const area=document.getElementById('doc-add-area');
  if(!area) return;
  area.innerHTML=`<div style="margin-bottom:8px">
    <div class="add-input-row" style="margin-bottom:6px">
      <input class="add-input" id="doc-label-input" placeholder="Label (e.g. Booking confirmation)" onkeydown="if(event.key==='Enter')confirmDoc();if(event.key==='Escape')renderPanelBody()">
    </div>
    <div class="add-input-row">
      <input class="add-input" id="doc-url-input" placeholder="URL (optional, e.g. https://...)" onkeydown="if(event.key==='Enter')confirmDoc();if(event.key==='Escape')renderPanelBody()">

}
function confirmDoc(){
  const labelInp=document.getElementById('doc-label-input');
  const urlInp=document.getElementById('doc-url-input');
  if(!labelInp||!labelInp.value.trim()) return;
  const url=urlInp?urlInp.value.trim():'';
  const e=state.selectedEvent;
  e.docs.push({id:'d'+Date.now(),label:labelInp.value.trim(),size:url||'',type:url?'link':'file'});
  saveData(); renderPanel();
}
function deleteDoc(eventId,docId){
  const e=EVENTS.find(ev=>ev.id===eventId); if(!e) return;
  e.docs=e.docs.filter(d=>d.id!==docId);
  if(state.selectedEvent&&state.selectedEvent.id===eventId) state.selectedEvent=e;
  saveData(); renderPanel();
}
function handleDocFile(input){
  if(!input.files||!input.files[0]) return;
  const file=input.files[0];
  const size=file.size>1024*1024?(file.size/1024/1024).toFixed(1)+' MB':(file.size/1024).toFixed(0)+' KB';
  const reader=new FileReader();
  reader.onload=function(ev){
    const e=state.selectedEvent;
    e.docs.push({id:'d'+Date.now(),label:file.name,size,type:'file',dataUrl:ev.target.result});
    saveData(); renderPanel();
  };
  reader.readAsDataURL(file);
}
function openDoc(d){
  if(d.type==='link'&&d.size) return window.open(d.size,'_blank','noopener');
  if(d.dataUrl){
    const a=document.createElement('a');
    a.href=d.dataUrl; a.download=d.label; a.click();
  }
}

function toggleTask(eventId,taskId){
  const e=EVENTS.find(ev=>ev.id===eventId); if(!e) return;
  const t=e.tasks.find(t=>t.id===taskId); if(!t) return;
  t.done=!t.done;
  if(state.selectedEvent&&state.selectedEvent.id===eventId) state.selectedEvent=e;
  saveData(); renderPanel(); renderStats();
  if(state.view==='calendar') renderCalendar();
}
function togglePanelPack(eventId,packId){
  const e=EVENTS.find(ev=>ev.id===eventId); if(!e) return;
  const p=e.packing.find(p=>p.id===packId); if(!p) return;
  p.done=!p.done;
  if(state.selectedEvent&&state.selectedEvent.id===eventId) state.selectedEvent=e;
  saveData(); renderPanel(); renderStats();
}
function togglePacking(eventId,packId){
  const e=EVENTS.find(ev=>ev.id===eventId); if(!e) return;
  const p=e.packing.find(p=>p.id===packId); if(!p) return;
  p.done=!p.done;
  saveData(); renderPacking(); renderStats();
}
function saveNotes(eventId,val){
  const e=EVENTS.find(ev=>ev.id===eventId); if(!e) return;
  e.notes=val;
  if(state.selectedEvent&&state.selectedEvent.id===eventId) state.selectedEvent=e;
  saveData();
}

// ── PERSISTENCE ────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'tripplanner_v1';
const IDB_NAME = 'tripplanner_fs';
const IDB_STORE = 'handles';
const IDB_KEY = 'saveFile';
let _fileHandle = null;

function _idbOpen() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e);
  });
}
async function _idbGet(key) {
  const db = await _idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = e => res(e.target.result);
    req.onerror = rej;
  });
}
async function _idbSet(key, val) {
  const db = await _idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(val, key);
    tx.oncomplete = res;
    tx.onerror = rej;
  });
}

async function pickSaveFile() {
  if (!window.showSaveFilePicker) {
    alert('Your browser does not support file saving.\nUse Chrome or Edge.');
    return;
  }
  try {
    const handle = await window.showSaveFilePicker({
      suggestedName: 'trip-planner-data.json',
      types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
    });
    _fileHandle = handle;
    await _idbSet(IDB_KEY, handle);
    updateFileBtn();
    await writeToFile();
    showSaveToast('✓ File linked');
  } catch(e) { if (e.name !== 'AbortError') console.warn(e); }
}

async function writeToFile() {
  if (!_fileHandle) return false;
  try {
    const writable = await _fileHandle.createWritable();
    await writable.write(JSON.stringify({ events: EVENTS, locations: LOCATIONS, savedAt: Date.now() }, null, 2));
    await writable.close();
    return true;
  } catch(e) {
    console.warn('File write failed', e);
    _fileHandle = null;
    updateFileBtn();
    return false;
  }
}

async function loadFromFile(handle) {
  try {
    const file = await handle.getFile();
    const text = await file.text();
    const parsed = JSON.parse(text);
    if (parsed && Array.isArray(parsed.events) && parsed.events.length) {
      EVENTS = parsed.events;
      if (Array.isArray(parsed.locations)) LOCATIONS = parsed.locations;
      return true;
    }
  } catch(e) { console.warn('File read failed', e); }
  return false;
}

function updateFileBtn() {
  const btn = document.getElementById('file-save-btn');
  if (!btn) return;
  if (_fileHandle) {
    btn.title = 'Saving to: ' + (_fileHandle.name || 'file') + '\nClick to change file';
    btn.style.color = 'var(--teal)';
  } else {
    btn.title = 'Link a save file on your computer';
    btn.style.color = 'var(--cream4)';
  }
}

async function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ events: EVENTS, locations: LOCATIONS, savedAt: Date.now() }));
  } catch(e) { console.warn('localStorage save failed', e); }
  const fileSaved = await writeToFile();
  showSaveToast(fileSaved ? '✓ Saved to file' : '✓ Saved');
}

async function loadData() {
  try {
    const handle = await _idbGet(IDB_KEY);
    if (handle) {
      const perm = await handle.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        const ok = await loadFromFile(handle);
        if (ok) { _fileHandle = handle; updateFileBtn(); return true; }
      } else {
        _fileHandle = handle;
        updateFileBtn();
      }
    }
  } catch(e) { console.warn('File handle restore failed', e); }

  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const parsed = JSON.parse(raw);
    if (parsed && Array.isArray(parsed.events) && parsed.events.length) {
      EVENTS = parsed.events;
      if (Array.isArray(parsed.locations)) LOCATIONS = parsed.locations;
      return true;
    }
  } catch(e) { console.warn('Load failed', e); }
  return false;
}

async function _maybeReconnectFile() {
  if (!_fileHandle) return;
  try {
    const perm = await _fileHandle.requestPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      await loadFromFile(_fileHandle);
      render();
      updateFileBtn();
    }
  } catch(e) {}
  document.removeEventListener('click', _maybeReconnectFile);
}
document.addEventListener('click', _maybeReconnectFile, { once: true });

let toastTimer = null;
function showSaveToast(msg = '✓ Saved') {
  const toast = document.getElementById('save-toast');
  if (!toast) return;
  toast.style.opacity = '1';
  toast.textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.style.opacity = '0'; }, 1800);
}

(function(){

  setVH();

loadData();
render();
